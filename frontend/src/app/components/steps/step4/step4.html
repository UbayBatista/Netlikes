<div class="step-form">
  <h2 class="subtitle">¿Qué te gusta ver?</h2>
  <p class="instruction">Selecciona al menos 3 géneros para personalizar tu cartelera.</p>

  <div class="genres-grid">
    <div *ngFor="let genero of generos; let i = index" 
         class="genre-chip" 
         [class.selected]="genero.selected"
         (click)="toggleGenero(i)">
      {{ genero.name }}
    </div>
  </div>

  <div class="button-group">
    <button class="arrow-btn" (click)="toPrev.emit()">
      <i class="bi bi-arrow-left"></i>
    </button>
    <button class="btn-finish" (click)="handleEnd()">Finalizar Registro</button>
  </div>
</div>
