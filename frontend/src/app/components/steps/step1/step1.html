<div class="step-form">
  
  <div class="input-group">
    <input type="text" placeholder="Nombre" class="form-input">
  </div>

  <div class="input-group">
    <input type="text" placeholder="Apellidos" class="form-input">
  </div>

  <div class="input-group">
    <input type="email" placeholder="Correo electrónico" class="form-input">
  </div>

  <div class="date-group">
    <select class="form-select"><option>Día</option></select>
    <select class="form-select"><option>Mes</option></select>
    <select class="form-select"><option>Año</option></select>
  </div>

  <div class="button-group single-btn">   
    <button class="arrow-btn" (click)="notificarSiguiente()">
        &#10230;
    </button>
   </div>
</div>
