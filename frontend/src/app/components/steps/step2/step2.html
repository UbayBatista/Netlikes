<div class="step-form">
  
  <div class="input-group">
    <input type="text" placeholder="Nombre de usuario" class="form-input">
  </div>

  <div class="input-group">
    <input type="password" placeholder="Contraseña" class="form-input">
  </div>

  <div class="input-group">
    <input type="password" placeholder="Confirmar contraseña" class="form-input">
  </div>

  <div class="input-group">
    <select class="form-select">
      <option value="" disabled selected>Pregunta de recuperación de contraseña</option>
      <option *ngFor="let pregunta of preguntas" [value]="pregunta">
        {{ pregunta }}
      </option>
    </select>
  </div>

  <div class="button-group">
    <button class="arrow-btn" (click)="notificarAtras()">
        &#10229; 
    </button>
    
    <button class="arrow-btn" (click)="notificarSiguiente()">
        &#10230;
    </button>
   </div>
</div>
