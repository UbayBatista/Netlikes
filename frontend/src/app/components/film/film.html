<div class="netflix-card" [routerLink]="['/film-details', id]">
  <img [src]="imgBaseUrl + posterPath" [alt]="title">

  @if(recommendations > 0) {
    <div class="recommend-badge">
      <i class="bi bi-arrow-up-short"></i>
      <span class="count">{{ recommendations }}</span>
    </div>
  }
</div>
