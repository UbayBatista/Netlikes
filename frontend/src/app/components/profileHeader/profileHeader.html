<div class="position-relative p-4 border-bottom border-dark border-2 bg-light">

    <div class="position-absolute top-0 end-0 p-3 z-3">
        <button class="btn btn-light border-dark shadow-sm" (click)="Menu()">
            <i class="bi bi-gear-fill"></i>
        </button>

        @if (openMenu) {

            <div class="position-fixed top-0 start-0 w-100 h-100" 
                 style="z-index: 1040; cursor: default;" 
                 (click)="openMenu = false">
            </div>

            <div class="dropdown-menu show position-absolute end-0 mt-1 shadow" 
                 style="min-width: 150px; right: 1rem; z-index: 1050;">
                @if (otherUser === "Yes") {
                    <button class="dropdown-item">{{option}}</button>
                } 
                @else {
                    <button class="dropdown-item fw-bold">{{option}}</button>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item text-danger fw-bold" (click)="logOut()">Cerrar sesión</button>
                }
            </div>
        }
    </div>

    <div class="d-flex align-items-center w-100 pe-5">

        <div class="d-flex align-items-center gap-4">
            
            <img class="rounded-circle border border-dark border-3 shadow-sm flex-shrink-0" 
                 style="width: 120px; height: 120px; object-fit: cover;" 
                 src="https://media.gettyimages.com/id/962792726/es/foto/kiev-ukraine-cristiano-ronaldo-of-real-madrid-poses-with-the-uefa-champions-league-trophy.jpg?s=612x612&w=gi&k=20&c=iGuCfZEUXyVagRfgPF765GB9CHIsyTplWQisj_AUC2U=" 
                 alt="Perfil">

            <div class="d-flex flex-column align-items-start gap-2">
                <h3 class="fw-bold m-0">{{userName}}</h3>
                <button class="btn btn-dark px-4 py-1 rounded-pill fw-bold shadow-sm" (click)="onEdit()">{{type}}</button>
            </div>

        </div>

        <div class="d-flex gap-4 ms-auto text-center">
            
            <div (click)="openSocial('Seguidores')" style="cursor: pointer;">
                <h6 class="text-muted text-uppercase fw-bold mb-0" style="font-size: 1rem;">Seguidores</h6>
                <p class="fw-bold fs-4 m-0">123</p>
            </div>

            <div (click)="openSocial('Seguidos')" style="cursor: pointer;">
                <h6 class="text-muted text-uppercase fw-bold mb-0" style="font-size: 1rem;">Seguidos</h6>
                <p class="fw-bold fs-4 m-0">123</p>
            </div>

        </div>

    </div>
</div>
