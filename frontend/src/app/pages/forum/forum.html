<app-header></app-header>
<div class="foro-container" [class.show-chat]="selectedForum">
  <aside class="sidebar-foros">
    <app-forum-list (clickedForum)="seeChat($event)"></app-forum-list>
  </aside>

  <main class="chat-main">
    <app-chat-window [selectedForumTitle]="currentTitle" (return)="returnToList()"></app-chat-window>
  </main>
</div>
