<app-header></app-header>

<div class="d-flex border-bottom border-dark border-2">
    
    <div 
        class="window" 
        [class.active]="selectedMode === 'Buscar Usuario'"
        (click)="changeMode('Buscar Usuario')">
        Buscar Usuarios
    </div>

    <div 
        class="window" 
        [class.active]="selectedMode === 'Chats'"
        (click)="changeMode('Chats')">
        Chats
    </div>

</div>

@if (selectedMode == "Buscar Usuario"){
    <app-social-search-user></app-social-search-user>
}
@else{
    <app-social-chats></app-social-chats>
}
