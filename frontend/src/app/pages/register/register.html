<div class="main-container">
    <div class="left-side">
        <app-brand-panel></app-brand-panel>
    </div>
    <div class="right-side">
        <div class="form-box">   
            <h2 class="text-black fw-bold mb-3">Registrarse</h2>
            @switch (currentStep) {
                @case (1) {
                    <app-step1 (toNext)="nextStep()"></app-step1>
                }
                @case (2) {
                    <app-step2 (toNext)="nextStep()" (toPrev)="prevStep()"></app-step2>
                }
                @case (3) {
                    <app-step3 (toNext)="nextStep()" (toPrev)="prevStep()"></app-step3>
                }
                @case (4) {
                    <app-step4 (toPrev)="prevStep()" (toEnd)="handleEnd($event)"></app-step4>
                }
                @default {
                    <p>Paso no reconocido</p>
                }
            }
        </div>
    </div>
</div>
