<div class="main-container d-flex">

  <div class="left-side">
    <app-brand-panel></app-brand-panel>
  </div>

  <div class="right-side">
    <div class="form-box">   
        @switch (currentStep) {
            @case (0) {
                <app-login-form (toNext)="nextStep()"></app-login-form>
            }
            @case (1) {
                <h2 class="text-black fw-bold mb-3">Registrarse</h2>
                <app-step1 [initialData]="registrationData" (toNext)="handleStep1($event)" (toPrev)="prevStep()"></app-step1>
            }
            @case (2) {
                <h2 class="text-black fw-bold mb-3">Registrarse</h2>
                <app-step2 [initialData]="registrationData" (toNext)="handleStep2($event)" (toPrev)="prevStep()"></app-step2>
            }
            @case (3) {
                <h2 class="text-black fw-bold mb-3">Registrarse</h2>
                <app-step3 [initialStatus]="termsAccepted" (toNext)="handleStep3($event)" (toPrev)="prevStep()"></app-step3>
            }
            @case (4) {
                <h2 class="text-black fw-bold mb-3">Registrarse</h2>
                <app-step4 (toPrev)="prevStep()" (toEnd)="handleEnd($event)"></app-step4>
            }
            @default {
                <p>Paso no reconocido</p>
            }
        }
        </div>
    </div>
    

</div>
